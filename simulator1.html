<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Palette シュミレーター by Little tree</title>
    <style>
        body { font-family: sans-serif; background-color: #fcf9f5; color: #4a4a4a; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .preview-area { background: white; border: 2px solid #e0dcd6; border-radius: 10px; overflow: hidden; }
        canvas { display: block; background-color: #fff; }
        .controls { width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .control-group { border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 15px; }
        button { margin: 2px; padding: 8px 12px; cursor: pointer; border: 1px solid #eee; background: #fff; border-radius: 6px; }
    </style>
</head>
<body>

<h2>Palette シュミレーター by Little tree</h2>

<div class="container">
    <div class="preview-area">
        <canvas id="mainCanvas" width="500" height="700"></canvas>
    </div>
    <div class="controls">
        <h3>【前身頃】生地の選択</h3>
        <button onclick="updateFabric('main', 'main_sax.JPG')">サックス（テスト用）</button>
        <button onclick="updateFabric('main', 'main_white.JPG')">ホワイト</button>
        <p>※ボタンを押して5秒待ってみてください！</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const currentFabrics = {'main': ''};

    function loadImage(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = src + "?t=" + new Date().getTime(); // 毎回新しい画像を読み込む
        });
    }

    async function updateFabric(partId, fabricUrl) {
        // ボタンが押されたか確認用のアラート（動いたら消してOK）
        console.log(partId + " を " + fabricUrl + " に変えるよ！");
        currentFabrics[partId] = fabricUrl;
        
        // --- 描画開始 ---
        ctx.clearRect(0, 0, 500, 700);

        // 1. 生地を読み込む
        const fabricImg = await loadImage(fabricUrl);
        // 2. 型紙を読み込む
        const maskImg = await loadImage('main_front.PNG');

        if (fabricImg && maskImg) {
            // A. まず「型抜きした生地」を描く
            ctx.save();
            ctx.drawImage(maskImg, 0, 0, 500, 700);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(fabricImg, 0, 0, 500, 700);
            ctx.restore();

            // B. その上に「枠線」を重ねる
            ctx.save();
            ctx.globalCompositeOperation = 'multiply'; // これで白い背景を透明にする
            ctx.drawImage(maskImg, 0, 0, 500, 700);
            ctx.restore();
            
            alert("描画が終わったよ！画面を見てみて！");
        } else {
            alert("画像が読み込めなかったみたい…名前があってるか確認してね。");
        }
    }
</script>
</body>
</html>
