<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Palette シュミレーター by Little tree</title>
    <style>
        body { font-family: sans-serif; background-color: #fcf9f5; color: #4a4a4a; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        
        /* プレビューエリア：お洋服が表示されるキャンバス */
        .preview-area { position: relative; width: 500px; height: 700px; background: white; border: 2px solid #e0dcd6; border-radius: 10px; overflow: hidden; }
        
        /* パーツごとの透過レイヤー */
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; display: none; }

        .controls { width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .control-group { border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 15px; }
        h3 { color: #8a7d6a; border-left: 5px solid #8a7d6a; padding-left: 12px; font-size: 15px; margin-bottom: 10px; }
        button { margin: 2px; padding: 6px 10px; cursor: pointer; border: 1px solid #eee; background: #fff; border-radius: 6px; font-size: 11px; }
        button:hover { background: #faf8f5; border-color: #8a7d6a; }
    </style>
</head>
<body>

<h2 style="text-align: center; color: #8a7d6a;">Palette シュミレーター</h2>

<div class="container">
    <div class="preview-area">
        <img id="view-main" class="layer">
        <img id="view-1" class="layer">
        <img id="view-2" class="layer">
        <img id="view-3" class="layer">
        <img id="view-4" class="layer">
        <img id="view-5" class="layer">
        <img id="view-6" class="layer">
    </div>

    <div class="controls">
        <div class="control-group">
            <h3>main: メイン（無地）</h3>
            <button onclick="change('main', 'lemon')">レモン</button>
            <button onclick="change('main', 'navy')">ネイビー</button>
            <button onclick="change('main', 'black')">ブラック</button>
            <button onclick="change('main', 'white')">ホワイト</button>
            <button onclick="change('main', 'ekuryu')">エクリュ</button>
        </div>

        <div class="control-group">
            <h3>1: 襟</h3>
            <button onclick="change('1', 'check_s_beige')">チェック(小)</button>
            <button onclick="change('1', 'white')">ホワイト</button>
            <button onclick="change('1', 'ekuryu')">エクリュ</button>
        </div>

        <div class="control-group">
            <h3>2: 袖</h3>
            <button onclick="change('2', 'check_s_beige')">チェック(小)</button>
            <button onclick="change('2', 'white')">ホワイト</button>
        </div>

        <div class="control-group">
            <h3>3: 身頃上</h3>
            <button onclick="change('3', 'warm')">ウォーム</button>
            <button onclick="change('3', 'white')">ホワイト</button>
        </div>

        <div class="control-group">
            <h3>4: 身頃下</h3>
            <button onclick="change('4', 'check_l_beige')">チェック(大)</button>
            <button onclick="change('4', 'white')">ホワイト</button>
        </div>

        <div class="control-group">
            <h3>5: 裾</h3>
            <button onclick="change('5', 'ekuryu')">エクリュ</button>
            <button onclick="change('5', 'white')">ホワイト</button>
        </div>

        <div class="control-group">
            <h3>6: ヨーク</h3>
            <button onclick="change('6', 'ekuryu')">エクリュ</button>
            <button onclick="change('6', 'white')">ホワイト</button>
        </div>
    </div>
</div>

<script>
    function change(part, fabric) {
        const target = document.getElementById('view-' + part);
        
        // 🌟 ここで小文字の .png に設定しています！
        const fileName = part + '_' + fabric + '.png';
        
        target.src = fileName;
        
        target.onload = function() {
            this.style.display = "block";
            console.log("読み込み成功: " + fileName);
        };
        
        target.onerror = function() {
            console.log("画像が見つかりません（名前を確認してね）: " + fileName);
            this.style.display = "none";
        };
    }
</script>

</body>
</html>
