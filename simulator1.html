<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Palette テスト</title>
</head>
<body>
    <h1>テスト画面</h1>
    <p>ボタンを押して、画面にメッセージが出れば成功です！</p>
    
    <button onclick="test('ホワイト')">ホワイト</button>
    <button onclick="test('サックス')">サックス</button>

    <div id="result" style="font-size: 30px; color: red; margin-top: 20px;"></div>

    <script>
        function test(name) {
            alert(name + "ボタンが押されました！");
            document.getElementById('result').innerText = name + "が選択されました";
        }
    </script>
</body>
</html>
