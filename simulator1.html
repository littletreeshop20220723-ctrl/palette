<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Palette シュミレーター by Little tree</title>
    <style>
        body { font-family: sans-serif; background-color: #fcf9f5; color: #4a4a4a; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .preview-area { background: white; border: 2px solid #e0dcd6; border-radius: 10px; position: relative; width: 500px; height: 700px; overflow: hidden; }
        
        /* 1. 生地のレイヤー：一番後ろ */
        #fabric-main { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-size: cover; background-position: center; display: none; }
        
        /* 2. 枠線のレイヤー：一番前 */
        .outline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; object-fit: contain; }
        
        .controls { width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>

<h2>Palette シュミレーター by Little tree</h2>

<div class="container">
    <div class="preview-area">
        <div id="fabric-main"></div>
        <img src="main_front.PNG" class="outline">
    </div>

    <div class="controls">
        <h3>【前身頃】生地の選択</h3>
        <button onclick="change('main_sax.JPG')">サックス</button>
        <button onclick="change('main_white.JPG')">ホワイト</button>
        <p>※ボタンを押すと背景の色が変わります！</p>
    </div>
</div>

<script>
    function change(url) {
        const fabric = document.getElementById('fabric-main');
        // 背景に生地を敷く
        fabric.style.backgroundImage = "url('" + url + "?v=" + new Date().getTime() + "')";
        fabric.style.display = "block";
        
        // 魔法！「服の形以外（白いところ）」を透明にして、後ろの生地を見せる設定
        const outline = document.querySelector('.outline');
        outline.style.mixBlendMode = "multiply"; 
        
        alert("色を変えたよ！どうかな？");
    }
</script>

</body>
</html>
