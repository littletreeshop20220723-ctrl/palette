<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Palette シュミレーター by Little tree</title>
    <style>
        body { font-family: sans-serif; background-color: #fcf9f5; color: #4a4a4a; margin: 0; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        
        /* プレビューエリア：すべての画像を重ねる場所 */
        .preview-area { position: relative; width: 500px; height: 700px; background: white; border: 2px solid #e0dcd6; border-radius: 10px; overflow: hidden; }
        
        /* 生地レイヤー（後ろ側）：ここに生地の画像を敷く */
        .fabric-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-size: cover; background-position: center; display: none; }
        
        /* 枠線レイヤー（前側）：生地の上に透過枠線を重ねる */
        .outline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; object-fit: contain; }
        
        /* 操作パネル */
        .controls { width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .control-group { border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 15px; }
        h2 { margin-top: 0; color: #8a7d6a; text-align: center; }
        h3 { color: #8a7d6a; border-left: 5px solid #8a7d6a; padding-left: 12px; font-size: 16px; margin-bottom: 10px; }
        .label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 13px; color: #666; }
        button { margin: 2px; padding: 8px 12px; cursor: pointer; border: 1px solid #eee; background: #fff; border-radius: 6px; font-size: 12px; transition: 0.2s; }
        button:hover { background: #faf8f5; border-color: #dcd6cc; }
    </style>
</head>
<body>

<h2>Palette シュミレーター by Little tree</h2>

<div class="container">
    <div class="preview-area">
        <div id="fabric-main" class="fabric-layer"></div>
        <div id="fabric-1" class="fabric-layer"></div>
        <img src="main_front.jpg" class="outline">
        <img src="1_front.jpg" class="outline">
        <img src="2_front.jpg" class="outline">
        <img src="3_front.jpg" class="outline">
        <img src="4_front.jpg" class="outline">
        <img src="5_front.jpg" class="outline">
        <img src="6_front.jpg" class="outline">
    </div>

    <div class="controls">
        <h3>【前身頃】生地の選択</h3>
        
        <div class="control-group">
            <span class="label">メイン生地（無地）：</span>
            <button onclick="applyFabric('main', 'main_white.JPG')">ホワイト</button>
            <button onclick="applyFabric('main', 'main_sax.JPG')">サックス</button>
            <button onclick="applyFabric('main', 'main_beige.JPG')">ベージュ</button>
            <button onclick="applyFabric('main', 'main_sage.JPG')">セージ</button>
            <button onclick="applyFabric('main', 'main_black.JPG')">ブラック</button>
            <button onclick="applyFabric('main', 'main_navy.JPG')">ネイビー</button>
            <button onclick="applyFabric('main', 'main_pink.JPG')">ピンク</button>
            <button onclick="applyFabric('main', 'main_lemon.JPG')">レモン</button>
        </div>

        <div class="control-group">
            <span class="label">① 襟：</span>
            <button onclick="applyFabric('1', 'main_white.JPG')">ホワイト</button>
            <button onclick="applyFabric('1', 'Berry_lavender.JPG')">ラベンダー</button>
        </div>
        
        <p style="font-size: 11px; color: #b0a89a;">
            ※ボタンを押して少し待つと反映されます！
        </p>
    </div>
</div>

<script>
    function applyFabric(partId, imgUrl) {
        // 今度は背景生地を表示させる「fabric-layer」の背景を変えます
        const layer = document.getElementById('fabric-' + partId);
        
        // 魔法！透過PNGを「型紙」として使うための命令
        // 例: mainならmain_front.jpg、1なら1_front.jpgを型紙にする
        const maskUrl = partId + '_front.jpg';
        
        layer.style.backgroundImage = "url('" + imgUrl + "')";
        layer.style.webkitMaskImage = "url('" + maskUrl + "')";
        layer.style.webkitMaskRepeat = "no-repeat";
        layer.style.webkitMaskSize = "contain";
        layer.style.webkitMaskPosition = "center";
        
        layer.style.display = "block";
    }
</script>

</body>
</html>
